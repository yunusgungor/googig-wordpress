user nobody;
worker_processes auto;
worker_rlimit_nofile 8192;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Keepalive Optimizasyonu
    keepalive_timeout 30;
    keepalive_requests 100;
    
    # Sendfile ve TCP Optimizasyonları
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    
    # Buffer Optimizasyonları
    client_body_buffer_size 128k;
    client_max_body_size 64m;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;
    output_buffers 1 32k;
    postpone_output 1460;
    
    # Timeout Optimizasyonları
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;
    reset_timedout_connection on;
    
    # 5. Madde: Microcaching Yolu / RAM'de tutulması için (Disk I/O olmaması adına) doğrudan /dev/shm kullanılıyor
    fastcgi_cache_path /dev/shm/nginx-cache levels=1:2 keys_zone=MICROCACHE:10m inactive=1s max_size=100m;
    fastcgi_cache_key "$scheme$request_method$host$request_uri";
    
    # Arka arkaya gelen 500 istekte sadece ilk isteği arkaya iletmek için lock açık (Thundering Herd koruması)
    fastcgi_cache_lock on;
    fastcgi_cache_lock_timeout 5s;
    # Arkadaki sunucu yavaşlarsa veya hata verirse, son başarılı microcache'i göster
    fastcgi_cache_use_stale error timeout invalid_header updating http_500 http_503;

    # --- PERFORMANS AYARLARI ---
    fastcgi_buffers 16 16k; 
    fastcgi_buffer_size 32k;
    
    # Access Log Kapatma (Disk I/O Tasarrufu)
    # Eğer Google Analytics kullanıyorsanız, nginx access log'larına ihtiyacınız yoktur
    access_log off;
    error_log /var/log/nginx/error.log warn;
    
    # Open File Cache (Dosya Tanımlayıcı Cache)
    open_file_cache max=10000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;
    
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_proxied any;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_vary on;
    
    # Brotli Sıkıştırma (Nginx modülü varsa)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    server {
        listen 80;
        root /var/www/html;
        index index.php;

        # Traefik health check — PHP'ye gitmeden direkt 200 döner
        location = /health {
            access_log off;
            return 200 "ok";
            add_header Content-Type text/plain;
        }
        
        # Statik dosyalar için aggressive browser caching (1 yıl)
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|webp|avif)$ {
            expires 365d;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
            access_log off;
        }
        
        # Font dosyaları için özel cache
        location ~* \.(woff|woff2|ttf|otf|eot)$ {
            expires 365d;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin "*";
            access_log off;
        }
        
        # Medya dosyaları için cache
        location ~* \.(mp4|webm|ogg|mp3|wav|flac|aac)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # XML-RPC Engelleme (Brute-Force Koruması)
        location = /xmlrpc.php {
            deny all;
            access_log off;
            return 444;
        }

        location / {
            try_files $uri $uri/ /index.php?$args;
        }

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param HTTPS $https if_not_empty;
            fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;

            # --- MICROCACHING ---
            fastcgi_cache MICROCACHE;
            fastcgi_cache_valid 200 301 302 1s; # Sihir burada: SADECE 1 SANİYE

            # Dinamik sayfalarda bypass kuralları (Admin paneline veya üyelere cache gösterme)
            set $skip_cache 0;
            if ($request_method = POST) { set $skip_cache 1; }
            if ($request_uri ~* "/wp-admin/|/xmlrpc.php|wp-.*.php|^/feed/*") { set $skip_cache 1; }
            if ($http_cookie ~* "comment_author|wordpress_[a-f0-9]+|wp-postpass|wordpress_logged_in") { set $skip_cache 1; }

            fastcgi_cache_bypass $skip_cache;
            fastcgi_no_cache $skip_cache;
            
            # İsteklerin nereden geldiğini görmek için
            add_header X-Micro-Cache $upstream_cache_status;
        }
    }
}
