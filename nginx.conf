user nobody;
worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # 5. Madde: Microcaching Yolu / RAM'de tutulması için (Disk I/O olmaması adına) doğrudan /dev/shm kullanılıyor
    fastcgi_cache_path /dev/shm/nginx-cache levels=1:2 keys_zone=MICROCACHE:10m inactive=1s max_size=100m;
    fastcgi_cache_key "$scheme$request_method$host$request_uri";
    
    # Arka arkaya gelen 500 istekte sadece ilk isteği arkaya iletmek için lock açık (Thundering Herd koruması)
    fastcgi_cache_lock on;
    # Arkadaki sunucu yavaşlarsa veya hata verirse, son başarılı microcache'i göster
    fastcgi_cache_use_stale error timeout invalid_header updating http_500 http_503;

    # --- PERFORMANS AYARLARI ---
    fastcgi_buffers 16 16k; 
    fastcgi_buffer_size 32k;
    
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_proxied any;
    gzip_min_length 1000;

    server {
        listen 80;
        root /var/www/html;
        index index.php;

        # Traefik health check — PHP'ye gitmeden direkt 200 döner
        location = /health {
            access_log off;
            return 200 "ok";
            add_header Content-Type text/plain;
        }

        location / {
            try_files $uri $uri/ /index.php?$args;
        }

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param HTTPS $https if_not_empty;
            fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;

            # --- MICROCACHING ---
            fastcgi_cache MICROCACHE;
            fastcgi_cache_valid 200 301 302 1s; # Sihir burada: SADECE 1 SANİYE

            # Dinamik sayfalarda bypass kuralları (Admin paneline veya üyelere cache gösterme)
            set $skip_cache 0;
            if ($request_method = POST) { set $skip_cache 1; }
            if ($request_uri ~* "/wp-admin/|/xmlrpc.php|wp-.*.php|^/feed/*") { set $skip_cache 1; }
            if ($http_cookie ~* "comment_author|wordpress_[a-f0-9]+|wp-postpass|wordpress_logged_in") { set $skip_cache 1; }

            fastcgi_cache_bypass $skip_cache;
            fastcgi_no_cache $skip_cache;
            
            # İsteklerin nereden geldiğini görmek için
            add_header X-Micro-Cache $upstream_cache_status;
        }
    }
}
